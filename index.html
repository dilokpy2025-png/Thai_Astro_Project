<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรเจกต์ทดสอบของฉัน</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #message {
            margin-top: 20px;
            font-weight: bold;
            color: #28a745;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>ยินดีด้วย! 🎉</h1>
        <p>ถ้าคุณเห็นหน้านี้ แสดงว่าไฟล์ HTML ของคุณทำงานแล้ว</p>
        <button onclick="sayHello()">ลองกดตรงนี้ดู</button>
        <p id="message"></p>
    </div>

    <script>
        function sayHello() {
            const msg = document.getElementById('message');
            msg.innerText = "ยินดีด้วย! เว็บไซต์ของคุณออนไลน์เรียบร้อยแล้ว 🚀";
            console.log("ปุ่มถูกกดแล้ว!");
        }
    </script>

</body>
</html>
