<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบวิเคราะห์ทะเบียนรถ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .radio-group { display: flex; gap: 20px; margin-top: 5px; }
        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #218838; }
        
        #resultTable {
            margin-top: 25px;
            width: 100%;
            border-collapse: collapse;
            display: none; /* ซ่อนไว้ก่อนกดวิเคราะห์ */
        }
        #resultTable th, #resultTable td {
            border: 1px solid #eee;
            padding: 12px;
            text-align: center;
        }
        #resultTable th { background-color: #f8f9fa; }
        .highlight { font-weight: bold; color: #007bff; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚗 วิเคราะห์ทะเบียนรถ</h2>
    
    <div class="form-group">
        <label>กรอกทะเบียนรถ (เช่น 1กข 1234)</label>
        <input type="text" id="plateInput" placeholder="ตัวอย่าง: 1กข 1234">
    </div>

    <div class="form-group">
        <label>ประเภทรถ</label>
        <div class="radio-group">
            <label><input type="radio" name="carType" value="มือ1" checked> มือ 1</label>
            <label><input type="radio" name="carType" value="มือ2"> มือ 2</label>
        </div>
    </div>

    <button onclick="analyzePlate()">วิเคราะห์ผล</button>

    <table id="resultTable">
        <thead>
            <tr>
                <th>รายการวิเคราะห์</th>
                <th>ผลรวมที่ได้</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>ผลรวมชุดหน้า (ตัวเลข+อักษร)</td>
                <td id="resFront" class="highlight">-</td>
            </tr>
            <tr>
                <td>ผลรวมชุดหลัง (ตัวเลข)</td>
                <td id="resBack" class="highlight">-</td>
            </tr>
            <tr>
                <td><strong>ผลรวมทั้งหมด</strong></td>
                <td id="resTotal" style="color: #d9534f; font-weight: bold; font-size: 1.5em;">-</td>
            </tr>
            <tr>
                <td>ประเภทรถ</td>
                <td id="resType">-</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    const charMap = {
        'ก': 1, 'ด': 1, 'ถ': 1, 'ท': 1, 'ภ': 1, 'ฤ': 1,
        'ข': 2, 'บ': 2, 'ป': 2, 'ง': 2, 'ช': 2,
        'ต': 3, 'ฑ': 3, 'ฒ': 3, 'ฆ': 3,
        'ค': 4, 'ธ': 4, 'ร': 4, 'ญ': 4, 'ษ': 4,
        'ฉ': 5, 'ณ': 5, 'ฌ': 5, 'น': 5, 'ม': 5, 'ห': 5, 'ฮ': 5, 'ฎ': 5, 'พ': 5,
        'จ': 6, 'ล': 6, 'ว': 6, 'อ': 6,
        'ซ': 7, 'ศ': 7, 'ส': 7,
        'ย': 8, 'ผ': 8, 'ฝ': 8, 'ฟ': 8,
        'ฏ': 9, 'ฐ': 9
    };

    function analyzePlate() {
        const input = document.getElementById('plateInput').value.trim();
        const carType = document.querySelector('input[name="carType"]:checked').value;
        
        // แยกส่วนหน้าและส่วนหลังด้วยช่องว่าง
        const parts = input.split(/\s+/);
        
        if (parts.length < 2) {
            alert("กรุณากรอกทะเบียนให้ครบถ้วน เช่น '1กข 1234' (เว้นวรรคระหว่างชุดหน้าและชุดหลัง)");
            return;
        }

        const frontPart = parts[0];
        const backPart = parts[1];

        // 3.1 หาผลรวมชุดหน้า
        let frontSum = 0;
        for (let char of frontPart) {
            if (!isNaN(char)) {
                frontSum += parseInt(char);
            } else if (charMap[char]) {
                frontSum += charMap[char];
            }
        }

        // 3.2 หาผลรวมชุดหลัง
        let backSum = 0;
        for (let char of backPart) {
            if (!isNaN(char)) {
                backSum += parseInt(char);
            }
        }

        // 3.3 ผลรวมทั้งหมด
        const totalSum = frontSum + backSum;

        // แสดงผลในตาราง
        document.getElementById('resFront').innerText = frontSum;
        document.getElementById('resBack').innerText = backSum;
        document.getElementById('resTotal').innerText = totalSum;
        document.getElementById('resType').innerText = carType;

        // แสดงตาราง
        document.getElementById('resultTable').style.display = 'table';
    }
</script>

</body>
</html>
